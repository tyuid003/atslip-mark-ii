name = "atslip-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

[vars]
TELEGRAM_API_ID = "38079589"
TELEGRAM_API_HASH = "8ca625ce4abf4f11553a5771fe5296e6"

# Worker routes — app.atslip.biz/api/* จะถูก handle โดย Worker นี้
# (Worker routes มีลำดับความสำคัญสูงกว่า Cloudflare Pages)
routes = [
  { pattern = "app.atslip.biz/api/*", zone_name = "atslip.biz" }
]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "atslip_db"
database_id = "5638e087-63c2-4fb6-95ad-66c864fdfa95"

# KV for Bank Accounts Cache
[[kv_namespaces]]
binding = "BANK_KV"
id = "4bdbda645df643df91bd042bd176b24d"

# Durable Objects for Real-Time Notifications
[[durable_objects.bindings]]
name = "PENDING_NOTIFICATIONS"
class_name = "PendingNotificationsDO"

# Durable Objects for Telegram Auth sessions
[[durable_objects.bindings]]
name = "TELEGRAM_AUTH_DO"
class_name = "TelegramAuthDO"

# Migration for Durable Objects (required for first deployment)
[[migrations]]
tag = "v1"
new_classes = ["PendingNotificationsDO"]

[[migrations]]
tag = "v2"
new_classes = ["TelegramAuthDO"]

[env.production]
routes = [
  { pattern = "*.atslip.app/api/*", zone_name = "atslip.app" }
]

# Scheduled Jobs (Cron)
[triggers]
crons = ["* * * * *"]  # ทุก 1 นาที

# Environment Variables (set via Cloudflare dashboard or wrangler secret)
# EASYSLIP_API_KEY = "your-easyslip-key"
