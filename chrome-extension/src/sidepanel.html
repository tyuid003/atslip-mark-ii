<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATslip</title>
  <link rel="stylesheet" href="css/sidepanel.css" />
</head>
<body>
  <!-- ============================================================ -->
  <!-- TOP NAV / สารบัญ (คลิกเพื่อ scroll ไปยังฟังก์ชัน)             -->
  <!-- ============================================================ -->
  <header class="app-header">
    <nav class="toc" id="toc">
      <button class="toc-link" data-target="section-scan" title="สแกนสลิป">
        <svg viewBox="0 0 24 24" class="ic"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 12h10"/></svg>
        <span>สแกน</span>
      </button>
      <button class="toc-link" data-target="section-list" title="รายการสแกน">
        <svg viewBox="0 0 24 24" class="ic"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        <span>รายการ</span>
      </button>
      <button class="toc-link" data-target="section-functions" title="สมาชิก">
        <svg viewBox="0 0 24 24" class="ic"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>สมาชิก</span>
      </button>
      <button class="toc-link toc-settings" id="btnSettings" title="ตั้งค่า">
        <svg viewBox="0 0 24 24" class="ic"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      </button>
    </nav>
  </header>

  <main class="app-body">
    <!-- แถบแจ้งเตือนเมื่อยังไม่ตั้งค่า -->
    <div id="configBanner" class="config-banner hidden">
      ยังไม่ได้ตั้งค่าทีม/ร้าน — กด <b>ตั้งค่า</b> ⚙️ เพื่อเริ่มใช้งาน
    </div>

    <!-- ============================================================ -->
    <!-- SECTION: สแกนสลิป (ช่องเดียว ใหญ่)                             -->
    <!-- ============================================================ -->
    <section id="section-scan" class="section">
      <h2 class="section-title">สแกนสลิป</h2>
      <div id="scanDropzone" class="scan-dropzone" tabindex="0">
        <div class="scan-idle" id="scanIdle">
          <svg viewBox="0 0 24 24" class="scan-ic"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <div class="scan-hint">ลากสลิปมาวาง / วาง (Ctrl+V)</div>
          <div class="scan-subhint">ระบบจะเลือกคีย์ที่ว่างให้อัตโนมัติ</div>
        </div>
        <div class="scan-preview hidden" id="scanPreview">
          <img id="scanPreviewImg" alt="preview" />
          <div class="scan-preview-overlay"><span class="spinner spinner-lg"></span></div>
        </div>
      </div>
      <div id="scanStatus" class="scan-status hidden"></div>
    </section>

    <!-- ============================================================ -->
    <!-- SECTION: ค้นหา + กรอง                                        -->
    <!-- ============================================================ -->
    <section id="section-search" class="section section-compact">
      <div class="search-row">
        <div class="search-box">
          <svg viewBox="0 0 24 24" class="ic"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="searchInput" placeholder="ค้นหาผู้โอน / ผู้รับ / ยูสเซอร์ / ยอดเงิน" />
        </div>
        <button class="filter-btn" id="btnFilter" title="กรอง">
          <svg viewBox="0 0 24 24" class="ic"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
        </button>
      </div>
      <div id="filterPanel" class="filter-panel hidden">
        <label>สถานะ
          <select id="filterStatus">
            <option value="">ทั้งหมด</option>
            <option value="pending">รอจับคู่</option>
            <option value="matched">จับคู่แล้ว</option>
            <option value="credited">เติมแล้ว</option>
            <option value="duplicate">ยอดซ้ำ</option>
          </select>
        </label>
        <label>จาก<input type="date" id="filterDateFrom" /></label>
        <label>ถึง<input type="date" id="filterDateTo" /></label>
        <button class="btn-secondary" id="btnApplyFilter">ใช้ตัวกรอง</button>
        <button class="btn-ghost" id="btnClearFilter">ล้าง</button>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- SECTION: รายการสแกน                                          -->
    <!-- ============================================================ -->
    <section id="section-list" class="section">
      <div class="section-title-row">
        <h2 class="section-title">รายการสแกน</h2>
        <button class="btn-ghost btn-refresh" id="btnRefresh" title="รีเฟรช">
          <svg viewBox="0 0 24 24" class="ic"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M3 21v-5h5"/></svg>
        </button>
      </div>
      <div id="pendingList" class="pending-list">
        <div class="pending-empty">ยังไม่มีรายการ...</div>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- SECTION: ฟังก์ชันอื่น ๆ (สมัคร / เปลี่ยนรหัสผ่าน)              -->
    <!-- ============================================================ -->
    <section id="section-functions" class="section">
      <h2 class="section-title">สมาชิก</h2>

      <!-- เลือกร้าน (tenant) สำหรับสมัคร/เปลี่ยนรหัสผ่าน — เลือกค้างไว้ในเครื่อง -->
      <div id="memberTenantBadges" class="tenant-badges"></div>

      <div class="func-card">
        <button class="func-header" data-toggle="funcRegister">
          <svg viewBox="0 0 24 24" class="ic"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM19 8v6M22 11h-6"/></svg>
          <span>สมัครสมาชิก (แยก tenant)</span>
        </button>
        <div class="func-body" id="funcRegister">
          <label>ชื่อ-นามสกุล<input type="text" id="regFullname" placeholder="เช่น ทด สอบ" /></label>
          <label>เบอร์โทร<input type="text" id="regPhone" inputmode="numeric" placeholder="08XXXXXXXX" /></label>
          <label>รหัสผ่าน<input type="text" id="regPassword" /></label>
          <label>ธนาคาร
            <select id="regBank"><option value="">— เลือกธนาคาร —</option></select>
          </label>
          <label>เลขบัญชี<input type="text" id="regBankAccount" inputmode="numeric" /></label>
          <button class="btn-primary" id="btnDoRegister">สมัครสมาชิก</button>
          <div class="func-status hidden" id="regStatus"></div>
        </div>
      </div>

      <div class="func-card">
        <button class="func-header" data-toggle="funcChangePw">
          <svg viewBox="0 0 24 24" class="ic"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>เปลี่ยนรหัสผ่านลูกค้า (แยก tenant)</span>
        </button>
        <div class="func-body" id="funcChangePw">
          <label>ค้นหาลูกค้า (เบอร์ / ชื่อ / เลขบัญชี)
            <div class="inline-row">
              <input type="text" id="cpSearch" placeholder="เช่น 0812345678" />
              <button class="btn-secondary" id="btnCpSearch">ค้นหา</button>
            </div>
          </label>
          <div id="cpResults" class="cp-results hidden"></div>
          <div id="cpSelected" class="cp-selected hidden"></div>
          <label>รหัสผ่านใหม่<input type="text" id="cpPassword" /></label>
          <button class="btn-primary" id="btnDoChangePw" disabled>เปลี่ยนรหัสผ่าน</button>
          <div class="func-status hidden" id="cpStatus"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ============================================================ -->
  <!-- MODAL: ค้นหา + จับคู่ผู้ใช้                                    -->
  <!-- ============================================================ -->
  <div id="matchModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <h3>ค้นหาและจับคู่ผู้ใช้</h3>
        <button class="modal-close" id="matchModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="match-search-row">
          <input type="text" id="matchSearchInput" placeholder="ค้นหาชื่อ / ยูสเซอร์ / เลขบัญชี" />
          <button class="btn-secondary" id="matchSearchBtn">ค้นหา</button>
        </div>
        <div id="matchResults" class="match-results"></div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MODAL: ตั้งค่า                                                -->
  <!-- ============================================================ -->
  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <h3>ตั้งค่า</h3>
        <button class="modal-close" id="settingsModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <label class="field">Team Slug
          <input type="text" id="setTeamSlug" placeholder="เช่น hengdragon-ruayruay" />
          <span class="field-hint">กรอกแค่ team slug — ระบบจัดการส่วนที่เหลือให้เบื้องหลัง</span>
        </label>
        <label class="field">ร้าน (Tenant)
          <select id="setTenant"><option value="">— ระบุ Team Slug ก่อน —</option></select>
        </label>
        <button class="btn-ghost btn-block" id="btnReloadTenants">โหลดรายชื่อร้านใหม่</button>
        <button class="btn-primary btn-block" id="btnSaveSettings">บันทึก</button>
        <div class="func-status hidden" id="settingsStatus"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/match-modal.js"></script>
  <script src="js/duplicate-popup.js"></script>
  <script src="js/scanlist.js"></script>
  <script src="js/realtime.js"></script>
  <script src="js/functions.js"></script>
  <script src="js/sidepanel.js"></script>
</body>
</html>
